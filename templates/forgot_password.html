<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Career Compass</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-container">
<div class="auth-card">

    <div style="margin-bottom:28px;">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;
                    background:linear-gradient(135deg,#a5b4fc,#22d3ee);
                    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
                    background-clip:text;margin-bottom:20px;">◈ Career Compass</div>
        <h1 style="font-size:1.9rem;text-align:center;">Forgot password</h1>
        <p class="subtitle">Enter your email — we'll send a reset link</p>
    </div>

    {% if msg %}
        <div style="background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.3);
                    padding:14px 16px;border-radius:8px;margin-bottom:16px;
                    color:#34d399;text-align:center;font-size:14px;">{{ msg }}</div>
    {% else %}
        <form method="POST">
            <div style="margin-bottom:4px;font-size:12px;color:var(--text-muted);font-weight:500;letter-spacing:.05em;">REGISTERED EMAIL</div>
            <input type="email" name="email" placeholder="your@email.com" required>
            <button type="submit">Send Reset Link</button>
        </form>
    {% endif %}

    <div class="auth-links" style="justify-content:center;margin-top:20px;">
        <a href="/">← Back to sign in</a>
    </div>

</div>
</div>
</body>
</html>
