<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password — Career Compass</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-container">
<div class="auth-card">
    <div style="margin-bottom:28px;">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;
                    background:linear-gradient(135deg,#a5b4fc,#22d3ee);
                    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
                    background-clip:text;margin-bottom:20px;">◈ Career Compass</div>
        <h1 style="font-size:1.9rem;text-align:center;">Reset password</h1>
    </div>

    {% if not valid %}
        <div style="background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);
                    padding:14px;border-radius:8px;color:#f87171;text-align:center;">
            This reset link is invalid or has expired. Please request a new one.
        </div>
        <div class="auth-links" style="justify-content:center;margin-top:20px;">
            <a href="/forgot-password">Request new link</a>
        </div>
    {% else %}
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="POST">
            <div style="margin-bottom:4px;font-size:12px;color:var(--text-muted);font-weight:500;letter-spacing:.05em;">NEW PASSWORD</div>
            <input type="password" name="password" placeholder="Enter new password" required minlength="6">
            <button type="submit">Reset Password</button>
        </form>
    {% endif %}
</div>
</div>
</body>
</html>
